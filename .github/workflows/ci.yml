name: CI

on:
  push:
    branches: [main, feature/full-redesign]
  pull_request:
    branches: [main]

jobs:
  # ── Type check + lint ──────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint

  # ── Bundle size budget ────────────────────────────────────
  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://dpavorestaurant.com
          NEXT_PUBLIC_GA_ID: G-PLACEHOLDER
      - name: Check bundle size
        run: npx size-limit

  # ── Accessibility tests ───────────────────────────────────
  a11y:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://dpavorestaurant.com
          NEXT_PUBLIC_GA_ID: G-PLACEHOLDER
      - run: npx playwright test tests/a11y.spec.ts
        env:
          BASE_URL: http://localhost:3000
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: a11y-report
          path: playwright-report/

  # ── Visual regression ─────────────────────────────────────
  visual:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://dpavorestaurant.com
          NEXT_PUBLIC_GA_ID: G-PLACEHOLDER
      - name: Update snapshots (first run) or compare
        run: npx playwright test tests/visual.spec.ts --update-snapshots
        env:
          BASE_URL: http://localhost:3000
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diffs
          path: test-results/
